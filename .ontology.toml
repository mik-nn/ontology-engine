[project]
name = "ontology-engine"
graph_dir = "logs/graphs"
shacl_shapes = [
    "core/shacl/databook_shapes.ttl",
    "core/shacl/dependencies_shapes.ttl",
    "core/shacl/planning_shapes.ttl",
]

[pipeline]
auto   = false
commit = false
push   = false

# ── LLM Provider ─────────────────────────────────────────────────────────────
# Default provider — used when role-specific configs below are absent or fail.
# Roles:
#   [llm]          → default fallback
#   [llm.write]    → write-code subtasks (code generation, stub filling)
#   [llm.reasoning]→ planning / analysis subtasks
#
# Set fallback = true in a role section to auto-revert to [llm] if unavailable.

[llm]
provider         = "ollama"
model            = "deepseek-coder-v2:16b"
base_url         = "http://localhost:11434"
verbose          = true
fallback         = false          # Avoid claude-code fallback

# ── Write role: code generation (Qwen2.5-Coder via local Ollama) ──────────────
# Best for 3080Ti 16GB: qwen2.5-coder:14b (~9GB Q4_K_M)
# Requires: ollama pull qwen2.5-coder:14b
[llm.write]
provider = "ollama"
model    = "deepseek-coder-v2:16b"
base_url = "http://localhost:11434"
fallback = true   # use [llm] if Ollama is not running

# ── Reasoning role: planning & analysis (DeepSeek-R1 via local Ollama) ────────
# Best for 3080Ti 16GB: deepseek-r1:14b (~9GB Q4_K_M)
# Requires: ollama pull deepseek-r1:14b
[llm.reasoning]
provider = "ollama"
model    = "deepseek-coder-v2:16b"
base_url = "http://localhost:11434"
fallback = true   # use [llm] if Ollama is not running

# ── KIMI K2 via API (Moonshot AI) ─────────────────────────────────────────────
# API-only, 1T MoE — large context (128K), good for analysis tasks
# Requires: export MOONSHOT_API_KEY=...
# [llm.reasoning]
# provider    = "litellm"
# model       = "openai/moonshot-v1-128k"
# base_url    = "https://api.moonshot.cn/v1"
# api_key_env = "MOONSHOT_API_KEY"
# fallback    = true
